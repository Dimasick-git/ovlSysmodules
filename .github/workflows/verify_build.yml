name: Verify build (PR smoke test)

defaults:
  run:
    shell: bash

on:
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'docs/**'

jobs:
  smoke:
    name: make (no zip, no upload)
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install extra switch libs (libpng, minizip)
        run: dkp-pacman -S --noconfirm --needed switch-libpng switch-libcurl switch-libzzip switch-mbedtls switch-libjpeg-turbo

      - name: make
        run: make -j$(nproc)

      - name: Sanity check artifact
        run: |
          test -f ovlSysmodules.ovl
          ls -la ovlSysmodules.ovl
          # RYZH signature should be the last 4 bytes
          tail -c 4 ovlSysmodules.ovl | xxd
