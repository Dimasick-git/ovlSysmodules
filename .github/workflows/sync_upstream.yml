name: Sync from upstream

defaults:
  run:
    shell: bash

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Merge upstream directly into main
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  'ryazhenka-sync-bot'
          git config user.email 'ryazhenka-sync-bot@users.noreply.github.com'

      - name: Add upstream remote & fetch
        run: |
          git remote add upstream https://github.com/ppkantorski/ovl-sysmodules.git
          git fetch upstream master

      - name: Check whether sync is needed
        id: check
        run: |
          BEHIND=$(git rev-list --count main..upstream/master)
          echo "Commits behind upstream: $BEHIND"
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

      - name: Merge upstream into main
        if: steps.check.outputs.behind != '0'
        run: |
          set -e
          if git merge --no-edit upstream/master; then
            echo "Clean merge into main"
          else
            echo "Conflicts: auto-resolving protected paths to 'ours'..."
            while IFS= read -r path; do
              [[ -z "$path" || "$path" == \#* ]] && continue
              for f in $(git ls-files --unmerged | awk '{print $4}' | sort -u); do
                case "$f" in
                  $path)
                    echo "  keeping ours: $f"
                    git checkout --ours -- "$f"
                    git add "$f"
                    ;;
                esac
              done
            done < .github/sync-protected-paths.txt
            git rm -r --cached --ignore-unmatch -- libs/libultrahand >/dev/null 2>&1 || true
            rm -rf -- libs/libultrahand 2>/dev/null || true
            if git ls-files --unmerged | grep -q .; then
              echo "::error::Non-protected conflicts remain. Manual fix required."
              exit 1
            fi
            git commit --no-edit
          fi

      - name: Push to main
        if: steps.check.outputs.behind != '0'
        run: git push origin main
        
